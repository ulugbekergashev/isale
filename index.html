<!doctype html>
<html lang="uz">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta name="description" content="Instagram'da 50,000 obunachi. Kafolat bilan. 4 oyda. Isale.Marketing — direct response studiya." />
<meta name="theme-color" content="#0A0A0A" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>Isale.Marketing — 50,000 obunachi. Kafolat bilan. 4 oyda.</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0A0A0A;
    --ink:#F5F5F0;
    --ink-dim:#9A9A92;
    --accent:#D4FF3F;
    --accent-warm:#E8FF5C;
    --line:#1F1F1B;
    --card:#111110;
  }
  html {
    scroll-behavior: smooth;
  }
  body {
    background: var(--bg);
    color: var(--ink);
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }
  .mono{font-family:'JetBrains Mono',ui-monospace,monospace;}
  .display{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;letter-spacing:-0.04em;line-height:0.92;font-stretch:75%;}
  .display-tight{letter-spacing:-0.05em;line-height:0.88;}
  .grain{
    position:fixed;inset:0;pointer-events:none;z-index:60;opacity:.06;mix-blend-mode:overlay;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='140'><filter id='n'><feTurbulence baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='0.55'/></svg>");
  }
  .marquee{display:flex;gap:3rem;white-space:nowrap;animation:scroll 40s linear infinite;}
  @keyframes scroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
  .ticker{display:flex;gap:3rem;white-space:nowrap;animation:tick 18s linear infinite;}
  @keyframes tick{from{transform:translateX(0)}to{transform:translateX(-50%)}}
  .hairline{border-color:var(--line);}
  .accent-bg{background:var(--accent);color:#0A0A0A;}
  .accent-text{color:var(--accent);}
  .scribble{
    background-image: linear-gradient(120deg, transparent 0 35%, #D4FF3F 35% 65%, transparent 65%);
    background-size:200% 100%;background-repeat:no-repeat;background-position:100% 0;
    transition:background-position .8s ease;
  }
  .reveal-line{display:inline-block;overflow:hidden;}
  .reveal-line>span{display:inline-block;}
  /* dot pulse */
  .pulse-dot{position:relative;}
  .pulse-dot::after{content:"";position:absolute;inset:-6px;border-radius:9999px;border:1px solid #D4FF3F;animation:pulse 1.6s ease-out infinite;}
  @keyframes pulse{0%{transform:scale(.6);opacity:.9}100%{transform:scale(1.6);opacity:0}}
  /* link underline */
  .ulink{background-image:linear-gradient(currentColor,currentColor);background-size:100% 1px;background-repeat:no-repeat;background-position:0 100%;}
  /* sticker */
  .sticker{
    background:#0A0A0A;color:#F5F5F0;display:inline-block;padding:.35em .6em;
    box-shadow: 6px 6px 0 #D4FF3F;
  }
  .sticker.warn{background:#fff;color:#0A0A0A;box-shadow:6px 6px 0 #FF5C2A;}
  /* number outline */
  .num-outline{
    -webkit-text-stroke:1.5px #F5F5F0;color:transparent;font-family:'Bricolage Grotesque';
    font-weight:800;letter-spacing:-.05em;line-height:.85;
  }
  /* table row hover */
  .row-hover:hover{background:#0F1206;}
  .row-hover:hover .row-arrow{transform:translateX(6px);color:#D4FF3F;}
  details>summary{list-style:none;cursor:pointer;}
  details>summary::-webkit-details-marker{display:none;}
  details[open] .faq-plus{transform:rotate(45deg);}
  .btn-primary{
    background:#D4FF3F;color:#0A0A0A;border:1px solid #D4FF3F;
    transition:transform .15s ease, box-shadow .2s ease, background .2s ease;
    box-shadow: 0 0 0 0 rgba(212,255,63,0);
  }
  .btn-primary:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0 #0A0A0A, 0 0 60px rgba(212,255,63,.45);}
  .btn-ghost{border:1px solid #2A2A24;color:#F5F5F0;transition:.15s ease;}
  .btn-ghost:hover{background:#15150F;border-color:#D4FF3F;color:#D4FF3F;}
  /* hero halo */
  .halo{
    position:absolute;inset:auto;width:1100px;height:1100px;border-radius:9999px;
    background:radial-gradient(closest-side, rgba(212,255,63,.18), rgba(212,255,63,0) 70%);
    filter:blur(20px);pointer-events:none;
  }
  /* subtle gradient line */
  .glow-line{height:1px;background:linear-gradient(90deg, transparent, rgba(212,255,63,.6), transparent);}
  /* sticky CTA bar slide in */
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .sticky-cta-show{animation:slideUp .35s ease both;}
  /* timeline dashed */
  .v-dash{background-image:linear-gradient(#2A2A24 50%, transparent 50%);background-size:1px 8px;background-repeat:repeat-y;}
  /* number rotate on hover */
  .live-pill{background:#0F0F0D;border:1px solid #1F1F1B;}
  .live-pill .dot{width:8px;height:8px;border-radius:9999px;background:#D4FF3F;box-shadow:0 0 12px #D4FF3F;}

  /* selection */
  ::selection{background:#D4FF3F;color:#0A0A0A;}

  /* ====== 3D PHONE SCENE ====== */
  .badge-float{
    position:absolute;background:#0F0F0D;border:1px solid #1F1F1B;border-radius:14px;padding:10px 14px;
    box-shadow:0 20px 40px rgba(0,0,0,.5);
    animation:float 5s ease-in-out infinite;
  }
  .badge-float.b2{animation-delay:-2s;animation-duration:6s;}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
  @keyframes disc-spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
  @keyframes heart-float{
    0%{transform:translateY(0) scale(1);opacity:1;}
    80%{opacity:.9;}
    100%{transform:translateY(-160px) scale(.25);opacity:0;}
  }
  @keyframes comment-float{
    0%{transform:translateY(0) scale(1);opacity:1;}
    70%{opacity:.8;}
    100%{transform:translateY(-130px) scale(.7);opacity:0;}
  }

  /* counter shimmer */
  .shimmer{
    background:linear-gradient(90deg,#F5F5F0 0%, #D4FF3F 50%, #F5F5F0 100%);
    background-size:200% 100%;
    -webkit-background-clip:text;background-clip:text;color:transparent;
    animation:shim 4s linear infinite;
  }
  @keyframes shim{0%{background-position:0 0}100%{background-position:-200% 0}}

  /* magnetic hover */
  .magnetic{transition:transform .25s cubic-bezier(.22,1,.36,1);}

  /* form */
  .field{
    width:100%;background:#0E0E0C;border:1px solid #1F1F1B;color:#F5F5F0;
    padding:16px 18px;border-radius:14px;font-size:16px;
    transition:border-color .2s, box-shadow .2s, background .2s;
  }
  .field:focus{outline:none;border-color:#D4FF3F;box-shadow:0 0 0 4px rgba(212,255,63,.12);background:#0F1206;}
  .field::placeholder{color:#5A5A52;}
  .field-label{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#9A9A92;}
  .chip{
    border:1px solid #1F1F1B;background:#0E0E0C;color:#C8C8BE;
    padding:10px 14px;border-radius:9999px;font-size:13px;cursor:pointer;
    transition:.15s ease;
  }
  .chip:hover{border-color:#D4FF3F;color:#D4FF3F;}
  .chip.on{background:#D4FF3F;color:#0A0A0A;border-color:#D4FF3F;}

  /* infinite ticker numbers */
  .digit-roll{display:inline-block;overflow:hidden;height:1em;line-height:1;vertical-align:bottom;}
  .digit-roll>span{display:block;animation:roll 1.6s ease-in-out infinite alternate;}
  @keyframes roll{0%{transform:translateY(0)}100%{transform:translateY(-1em)}}

  /* counter section big bg type */
  .stamp{
    color:transparent;-webkit-text-stroke:1px rgba(245,245,240,.06);
    font-family:'Bricolage Grotesque';font-weight:800;letter-spacing:-.05em;line-height:.85;
  }

  /* responsive scale */
  .h-mega{font-size: clamp(56px, 11vw, 196px);}
  .h-big{font-size: clamp(40px, 7vw, 120px);}
  .h-mid{font-size: clamp(28px, 4.4vw, 72px);}
</style>
</head>
<body class="bg-[#0A0A0A] text-[#F5F5F0]">
  <div class="grain" aria-hidden="true"></div>
  <div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
